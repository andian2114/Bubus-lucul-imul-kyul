<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; width: 100%; color: white; z-index: 10;
        }
        h1 { font-size: 2.2rem; letter-spacing: 5px; text-shadow: 0 0 15px #ff0000; margin: 0; font-weight: bold; }
        p { opacity: 0.6; font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="text">
        <h1>ONLY FOR YOU</h1>
        <p>Sentuh & putar galaksinya</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. SETTING KAMERA (EFEK ZOOM-IN)
        camera.position.z = 60; 

        // 2. BINTANG-BINTANG (LATAR BELAKANG)
        let starGeo = new THREE.BufferGeometry();
        let starCount = 5000;
        let starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5)*150;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.1, color: 0xffffff }));
        scene.add(stars);

        // 3. BOLA MERAH DI TENGAH
        let globe = new THREE.Mesh(
            new THREE.SphereGeometry(2, 32, 32), 
            new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
        );
        scene.add(globe);

        // 4. BAGIAN FOTO (GANTI LINK DI BAWAH INI)
        const fotoUrls = [
            'https://ibb.co.com/DDjV64QC"><img src="https://i.ibb.co.com/d0HW3BD2/Screenshot-20260503-161215.jpg', // Ganti dengan Direct Link dari Postimages
            'https://ibb.co.com/hxDmtxpZ"><img src="https://i.ibb.co.com/TDmgFDzb/IMG-20260116-130706-Burst20.jpg',
            'https://ibb.co.com/JRYJhq3v"><img src="https://i.ibb.co.com/mCnWx0N9/IMG-20260127-113943.jpg',
            'https://ibb.co.com/xK2kRrg5"><img src="https://i.ibb.co.com/JWc1MSpk/IMG-20260210-061811.jpg',
            'https://i.ibb.co.com/LzB13JHp/IMG-20260213-144408.jpg',
            'https://ibb.co.com/YFhQdn8S"><img src="https://i.ibb.co.com/C3Q89Cvy/IMG-20260314-152509.jpg',
            'https://ibb.co.com/hxYLM74L"><img src="https://i.ibb.co.com/twLQhmvQ/IMG-20260327-070920.jpg',
            'https://ibb.co.com/0RvMMS9k"><img src="https://i.ibb.co.com/39QNNqFw/IMG-20260426-131810.jpg',
            'https://ibb.co.com/tFvG0H1"><img src="https://i.ibb.co.com/Td7fQwN/IMG-20251117-WA0016.jpg',
            'https://ibb.co.com/KcDCVHZp"><img src="https://i.ibb.co.com/LDr49fwX/IMG-20251207-113438.jpg'
            'https://ibb.co.com/pj8W8mvw"><img src="https://i.ibb.co.com/jk2V2pvf/IMG-20251117-WA0015.jpg'
            'https://i.ibb.co.com/VcX367vw/IMG-20250520-115436.jpg'
        ];

        const loader = new THREE.TextureLoader();
        fotoUrls.forEach((url) => {
            if(url.includes('http')) { // Cek apakah link sudah diisi
                loader.load(url, (texture) => {
                    const mesh = new THREE.Mesh(
                        new THREE.PlaneGeometry(4, 4), 
                        new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
                    );
                    // Sebar posisi foto secara acak
                    mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*30);
                    mesh.lookAt(0, 0, 0);
                    scene.add(mesh);
                });
            }
        });

        // 5. ANIMASI
        function animate() {
            requestAnimationFrame(animate);
            if (camera.position.z > 18) camera.position.z -= 0.2; // Efek maju perlahan
            stars.rotation.y += 0.0005;
            globe.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // KONTROL SENTUH HP
        document.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            scene.rotation.y = (touch.pageX / window.innerWidth - 0.5) * 2;
            scene.rotation.x = (touch.pageY / window.innerHeight - 0.5) * 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
