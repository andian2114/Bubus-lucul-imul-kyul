<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; width: 100%; color: white;
            z-index: 10;
        }
        h1 { font-size: 2rem; letter-spacing: 5px; text-shadow: 0 0 15px red; margin: 0; }
        p { opacity: 0.5; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="text">
        <h1 id="title">ONLY FOR YOU</h1>
        <p>Sentuh & putar galaksinya</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. ANIMASI MASUK (Zoom In)
        camera.position.z = 50; // Mulai dari jauh

        // 2. BINTANG & BOLA TENGAH
        let geo = new THREE.BufferGeometry();
        let counts = 4000;
        let pos = new Float32Array(counts * 3);
        for(let i=0; i<counts*3; i++) pos[i] = (Math.random()-0.5)*150;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        let stars = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.1, color: 0xffffff }));
        scene.add(stars);

        let globe = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true }));
        scene.add(globe);

        // 3. TAMBAH FOTO MELAYANG (Contoh 3 Foto)
        // Ganti URL di bawah dengan link foto pasanganmu (bisa dari IG/FB atau upload ke postimages.org)
        const fotoUrls = [
            'https://picsum.photos/200/200?random=1', 
            'https://picsum.photos/200/200?random=2',
            'https://picsum.photos/200/200?random=3'
        ];

        const loader = new THREE.TextureLoader();
        fotoUrls.forEach((url) => {
            loader.load(url, (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                const geometry = new THREE.PlaneGeometry(3, 3);
                const mesh = new THREE.Mesh(geometry, material);
                
                // Sebar foto secara acak di sekitar bola
                mesh.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
                mesh.lookAt(0, 0, 0);
                scene.add(mesh);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Efek Zoom In pelan saat pertama buka
            if (camera.position.z > 15) camera.position.z -= 0.3;

            stars.rotation.y += 0.001;
            globe.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // Touch Control
        document.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            scene.rotation.y = touch.pageX * 0.01;
            scene.rotation.x = touch.pageY * 0.01;
        });
    </script>
</body>
</html>
