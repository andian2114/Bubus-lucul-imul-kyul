<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Universe</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; width: 100%; color: white; z-index: 10;
        }
        h1 { font-size: 2.2rem; letter-spacing: 5px; text-shadow: 0 0 15px #ff0000; margin: 0; font-weight: bold; }
        p { opacity: 0.6; font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="text">
        <h1>ONLY FOR BUBUS LUCUL IMUL KYUL</h1>
        <p>Sentuh untuk mulai galaksi & musik</p>
    </div>

    <audio id="loveSong" loop>
        <source src="https://files.catbox.moe/978pky.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 60; 

        let starGeo = new THREE.BufferGeometry();
        let starCount = 5000;
        let starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random()-0.5)*150;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        let stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.1, color: 0xffffff }));
        scene.add(stars);

        let globe = new THREE.Mesh(
            new THREE.SphereGeometry(2, 32, 32), 
            new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
        );
        scene.add(globe);

        const fotoUrls = [
            'https://i.ibb.co.com/d0HW3BD2/Screenshot-20260503-161215.jpg',
            'https://i.ibb.co.com/TDmgFDzb/IMG-20260116-130706-Burst20.jpg',
            'https://i.ibb.co.com/mCnWx0N9/IMG-20260127-113943.jpg',
            'https://i.ibb.co.com/JWc1MSpk/IMG-20260210-061811.jpg',
            'https://i.ibb.co.com/LzB13JHp/IMG-20260213-144408.jpg',
            'https://i.ibb.co.com/C3Q89Cvy/IMG-20260314-152509.jpg',
            'https://i.ibb.co.com/twLQhmvQ/IMG-20260327-070920.jpg',
            'https://i.ibb.co.com/39QNNqFw/IMG-20260426-131810.jpg',
            'https://i.ibb.co.com/Td7fQwN/IMG-20251117-WA0016.jpg',
            'https://i.ibb.co.com/LDr49fwX/IMG-20251207-113438.jpg',
            'https://i.ibb.co.com/jk2V2pvf/IMG-20251117-WA0015.jpg',
            'https://i.ibb.co.com/VcX367vw/IMG-20250520-115436.jpg'
        ];

        const loader = new THREE.TextureLoader();
        fotoUrls.forEach((url) => {
            loader.load(url, (texture) => {
                // UKURAN RANDOM (Ada yang kecil 4, ada yang besar sampai 10)
                const randomSize = 4 + Math.random() * 6;
                const mesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(randomSize, randomSize), 
                    new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
                );
                mesh.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*40);
                mesh.lookAt(0, 0, 0);
                scene.add(mesh);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            if (camera.position.z > 25) camera.position.z -= 0.15; 
            stars.rotation.y += 0.0005;
            globe.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // KONTROL MUSIC & TOUCH
        let musicStarted = false;
        const audio = document.getElementById('loveSong');

        document.addEventListener('touchstart', () => {
            if(!musicStarted) {
                audio.play();
                musicStarted = true;
                document.querySelector('p').innerHTML = "Geser untuk memutar dunia kita";
            }
        });

        document.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            scene.rotation.y = (touch.pageX / window.innerWidth - 0.5) * 2;
            scene.rotation.x = (touch.pageY / window.innerHeight - 0.5) * 2;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
